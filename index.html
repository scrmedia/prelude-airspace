<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Airspace Map – Prelude</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, 'SF Pro Rounded', sans-serif;
            background: #F7F5F2;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            flex-shrink: 0;
            background: #1A2140;
            color: white;
            padding: 14px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-top: max(14px, env(safe-area-inset-top));
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .header-icon {
            font-size: 22px;
            flex-shrink: 0;
        }

        .venue-name {
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .open-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #3F8C66;
            color: white;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 20px;
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        .open-btn:active { opacity: 0.8; }

        .map-wrap {
            flex: 1;
            position: relative;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        footer {
            flex-shrink: 0;
            background: #F7F5F2;
            border-top: 1px solid #E0DEDA;
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            text-align: center;
            font-size: 11px;
            color: #7A7370;
            line-height: 1.4;
        }

        footer a { color: #3F8C66; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <span class="header-icon">✈️</span>
            <span class="venue-name" id="venue-name">Airspace Map</span>
        </div>
        <a id="open-btn" class="open-btn" href="#" target="_blank" rel="noopener">
            Open full map ↗
        </a>
    </header>

    <div class="map-wrap">
        <iframe
            id="map-frame"
            src=""
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
    </div>

    <footer>
        Data source: <a href="https://nats.aero" target="_blank" rel="noopener">NATS</a>
        official UK UAS restriction zones — updated every 28 days.
    </footer>

    <script>
        const NATS_MAP_ID = '1BktWMPYNuh6N5_IPngyq8jW80nAWXI8d';

        const p = new URLSearchParams(window.location.search);
        const lat  = parseFloat(p.get('lat'))  || 54.5;
        const lng  = parseFloat(p.get('lng'))  || -2.0;
        const zoom = parseInt(p.get('zoom'))   || (p.has('lat') ? 13 : 6);
        const name = p.get('name') || 'UK Airspace';

        document.getElementById('venue-name').textContent = decodeURIComponent(name);
        document.title = `${decodeURIComponent(name)} – Airspace Map`;

        const embedUrl  = `https://www.google.com/maps/d/embed?mid=${NATS_MAP_ID}&ll=${lat},${lng}&z=${zoom}`;
        const viewerUrl = `https://www.google.com/maps/d/viewer?mid=${NATS_MAP_ID}&ll=${lat},${lng}&z=${zoom}`;

        document.getElementById('map-frame').src  = embedUrl;
        document.getElementById('open-btn').href  = viewerUrl;
    </script>
</body>
</html>
