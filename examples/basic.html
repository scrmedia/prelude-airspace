<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prelude Airspace Map</title>
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    
    <!-- ol-dji-geozones CSS -->
    <link rel="stylesheet" href="../dist/ol-dji-geozones.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', 'Segoe UI', sans-serif;
            background-color: #F7F5F2; /* Prelude Canvas */
            overflow: hidden;
        }
        
        #map {
            width: 100vw;
            height: 100vh;
        }
        
        /* Loading overlay */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(247, 245, 242, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E0DEDA;
            border-top-color: #3F8C66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 16px;
            color: #1A2140;
            font-weight: 600;
        }
        
        /* Prelude header */
        .prelude-header {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(254, 252, 250, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 18px;
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(31, 24, 20, 0.12);
            z-index: 1000;
            max-width: calc(100vw - 32px);
        }
        
        .prelude-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #1A2140;
            margin: 0 0 4px 0;
        }
        
        .location-info {
            font-size: 13px;
            color: #7A7370;
            margin: 0;
        }
        
        .open-maps-btn {
            margin-top: 10px;
            padding: 8px 14px;
            background: #3F8C66;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
        }
        
        .open-maps-btn:hover {
            background: #357856;
        }
        
        .open-maps-btn:active {
            transform: scale(0.98);
        }
        
        /* Legend */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 16px;
            background: rgba(254, 252, 250, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(31, 24, 20, 0.12);
            z-index: 1000;
            max-width: 280px;
        }
        
        .legend h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1A2140;
            margin: 0 0 10px 0;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .legend-item:last-child {
            margin-bottom: 0;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .legend-text {
            font-size: 12px;
            color: #1F1C1A;
            line-height: 1.3;
        }
        
        .legend-disclaimer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #E0DEDA;
            font-size: 10px;
            color: #7A7370;
            line-height: 1.4;
        }
        
        /* Mobile optimization */
        @media (max-width: 768px) {
            .prelude-header {
                top: 12px;
                left: 12px;
                right: 12px;
                padding: 12px 14px;
            }
            
            .prelude-header h1 {
                font-size: 16px;
            }
            
            .location-info {
                font-size: 12px;
            }
            
            .open-maps-btn {
                font-size: 12px;
                padding: 7px 12px;
            }
            
            .legend {
                bottom: 12px;
                left: 12px;
                right: 12px;
                max-width: none;
            }
        }
        
        /* Custom DJI zone colors (Prelude palette) */
        .ol-dji-geozones-level-0 { 
            fill: rgba(63, 140, 102, 0.15);
            stroke: #3F8C66;
        }
        .ol-dji-geozones-level-1 { 
            fill: rgba(199, 157, 89, 0.2);
            stroke: #C79D59;
        }
        .ol-dji-geozones-level-2 { 
            fill: rgba(199, 157, 89, 0.25);
            stroke: #C79D59;
        }
        .ol-dji-geozones-level-3 { 
            fill: rgba(199, 157, 89, 0.3);
            stroke: #C79D59;
        }
        .ol-dji-geozones-level-4 { 
            fill: rgba(217, 64, 53, 0.25);
            stroke: #D94035;
        }
        .ol-dji-geozones-level-5 { 
            fill: rgba(217, 64, 53, 0.35);
            stroke: #D94035;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Loading airspace data...</p>
        </div>
    </div>
    
    <!-- Prelude header -->
    <div class="prelude-header">
        <h1>🛩️ Airspace Map</h1>
        <p class="location-info" id="location-info">Loading location...</p>
        <button class="open-maps-btn" onclick="openGoogleMaps()">
            Open in Google Maps
        </button>
    </div>
    
    <!-- Legend -->
    <div class="legend">
        <h3>Airspace Zones</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #D94035;"></div>
            <div class="legend-text">Prohibited<br><span style="opacity: 0.7;">No-fly zone</span></div>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #C79D59;"></div>
            <div class="legend-text">Restricted<br><span style="opacity: 0.7;">Authorization required</span></div>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #3F8C66;"></div>
            <div class="legend-text">Clear<br><span style="opacity: 0.7;">Caution advised</span></div>
        </div>
        <div class="legend-disclaimer">
            Data from DJI FlySafe. Always verify with local authorities before flying.
        </div>
    </div>
    
    <!-- Map container -->
    <div id="map"></div>
    
    <!-- OpenLayers -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    
    <!-- ol-dji-geozones -->
    <script src="../dist/ol-dji-geozones.js"></script>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const lat = parseFloat(urlParams.get('lat')) || 51.5074;
        const lng = parseFloat(urlParams.get('lng')) || -0.1278;
        
        // Update location info
        document.getElementById('location-info').textContent = 
            `Venue: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        
        console.log('🗺️ Initializing Prelude Airspace Map');
        console.log('📍 Venue location:', lat, lng);
        
        // Initialize OpenLayers map
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([lng, lat]),
                zoom: 13
            })
        });
        
        // Add venue marker
        const venueMarker = new ol.Feature({
            geometry: new ol.geom.Point(ol.proj.fromLonLat([lng, lat]))
        });
        
        const venueStyle = new ol.style.Style({
            image: new ol.style.Circle({
                radius: 12,
                fill: new ol.style.Fill({ color: '#3F8C66' }),
                stroke: new ol.style.Stroke({ 
                    color: 'white', 
                    width: 3 
                })
            }),
            zIndex: 999
        });
        
        venueMarker.setStyle(venueStyle);
        
        const vectorSource = new ol.source.Vector({
            features: [venueMarker]
        });
        
        const vectorLayer = new ol.layer.Vector({
            source: vectorSource
        });
        
        map.addLayer(vectorLayer);
        
        // Initialize DJI Geozones
        const djiGeozones = new ol.control.DjiGeozones({
            urlProxy: 'https://corsproxy.io/?',
            drone: 'spark',
            zonesMode: 'total',
            country: 'GB',
            displayLevels: [5, 4, 3, 2, 1, 0],
            activeLevels: [5, 4, 3, 2, 1, 0],
            createPanel: false, // No control panel
            startActive: true,
            language: 'en'
        });
        
        map.addControl(djiGeozones);
        
        // Hide loading when map is ready
        map.once('rendercomplete', function() {
            console.log('✅ Map rendered');
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });
        
        // Fallback: hide loading after 5 seconds regardless
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 5000);
        
        // Google Maps fallback
        function openGoogleMaps() {
            const url = `https://www.google.com/maps?q=${lat},${lng}&z=14`;
            window.open(url, '_blank');
        }
        
        console.log('🚀 Prelude Airspace Map ready');
    </script>
</body>
</html>
