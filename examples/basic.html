<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airspace Map - Prelude</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Rounded', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F7F5F2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(31, 24, 20, 0.08);
            z-index: 10;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon {
            font-size: 28px;
        }

        .header-text {
            flex: 1;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1A2140;
            margin: 0;
        }

        .venue-coords {
            color: #7A7370;
            font-size: 14px;
            margin-top: 2px;
        }

        .powered-by {
            color: #7A7370;
            font-size: 13px;
            text-align: right;
        }

        .powered-by a {
            color: #3F8C66;
            text-decoration: none;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #F7F5F2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E0DEDA;
            border-top-color: #1A2140;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: #7A7370;
            font-size: 15px;
        }

        .fallback-container {
            padding: 32px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .fallback-card {
            background: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(31, 24, 20, 0.08);
            text-align: center;
        }

        .fallback-card h2 {
            color: #1A2140;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .fallback-card p {
            color: #7A7370;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .button {
            display: inline-block;
            background: #3F8C66;
            color: white;
            padding: 14px 32px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: opacity 0.2s;
            margin: 8px;
        }

        .button:hover { opacity: 0.9; }

        .button.secondary { background: #1A2140; }

        @media (max-width: 768px) {
            header { padding: 12px 16px; }
            h1 { font-size: 18px; }
            .venue-coords { font-size: 13px; }
            .powered-by { display: none; }
            .button { display: block; margin: 8px 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <span class="icon">✈️</span>
            <div class="header-text">
                <h1>Airspace Map</h1>
                <div class="venue-coords" id="venue-display">Loading venue location...</div>
            </div>
            <div class="powered-by">
                Powered by<br>
                <a href="https://www.altitudeangel.com/solutions/dronesafetymap" target="_blank">Altitude Angel</a>
            </div>
        </div>
    </header>

    <div class="map-container">
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading airspace map...</div>
        </div>

        <iframe
            id="map-frame"
            src=""
            allowfullscreen
            loading="eager"
        ></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lat = parseFloat(urlParams.get('lat'));
        const lng = parseFloat(urlParams.get('lng'));

        if (isNaN(lat) || isNaN(lng)) {
            showFallback('Missing Coordinates', 'Please provide valid latitude and longitude in the URL.');
        } else {
            document.getElementById('venue-display').textContent = `Venue: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

            const mapUrl = `https://dronesafetymap.com/#lat=${lat}&lng=${lng}&zoom=14`;
            const iframe = document.getElementById('map-frame');
            iframe.src = mapUrl;

            iframe.addEventListener('load', () => {
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 1000);
            });

            // Fallback if iframe never fires load (some browsers block cross-origin events)
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 8000);
        }

        function showFallback(title, message) {
            const coordLinks = (!isNaN(lat) && !isNaN(lng)) ? `
                <a href="https://dronesafetymap.com/" target="_blank" class="button">
                    Open Drone Safety Map →
                </a>
                <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="button secondary">
                    Open in Google Maps →
                </a>
            ` : '';

            document.getElementById('loading').innerHTML = `
                <div class="fallback-container">
                    <div class="fallback-card">
                        <h2>${title}</h2>
                        <p>${message}</p>
                        ${coordLinks}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
