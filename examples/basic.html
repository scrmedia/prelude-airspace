<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airspace Map - Prelude</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Pro Rounded', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F7F5F2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: white;
            padding: 14px 20px;
            box-shadow: 0 2px 8px rgba(31, 24, 20, 0.08);
            z-index: 10;
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-text { flex: 1; }

        h1 {
            font-size: 18px;
            font-weight: 700;
            color: #1A2140;
            margin: 0;
        }

        .venue-coords {
            color: #7A7370;
            font-size: 13px;
            margin-top: 2px;
        }

        /* Map fills the rest */
        #map {
            flex: 1;
            width: 100%;
        }

        /* Action bar pinned above the map bottom */
        .action-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 16px;
            width: 100%;
            max-width: 480px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(31, 24, 20, 0.18);
            white-space: nowrap;
            transition: transform 0.1s, opacity 0.1s;
        }

        .btn:active { transform: scale(0.97); opacity: 0.9; }

        .btn-primary {
            background: #1A2140;
            color: white;
            flex: 1;
        }

        .btn-secondary {
            background: white;
            color: #1A2140;
        }

        /* Venue pin label */
        .venue-label {
            position: absolute;
            background: white;
            color: #1A2140;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(31,24,20,0.15);
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -150%);
        }

        @media (max-width: 480px) {
            .btn { font-size: 13px; padding: 12px 18px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-text">
                <h1>✈️ Airspace Map</h1>
                <div class="venue-coords" id="venue-display">Loading...</div>
            </div>
        </div>
    </header>

    <div style="position: relative; flex: 1; display: flex; flex-direction: column;">
        <div id="map"></div>

        <div class="action-bar">
            <a id="btn-airspace" class="btn btn-primary" href="#" target="_blank">
                🛩 Check Airspace Restrictions
            </a>
            <a id="btn-maps" class="btn btn-secondary" href="#" target="_blank">
                📍 Google Maps
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lat = parseFloat(urlParams.get('lat')) || 51.5074;
        const lng = parseFloat(urlParams.get('lng')) || -0.1278;

        document.getElementById('venue-display').textContent =
            `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

        document.getElementById('btn-airspace').href =
            `https://dronesafetymap.com/#lat=${lat}&lng=${lng}&zoom=14`;

        document.getElementById('btn-maps').href =
            `https://www.google.com/maps?q=${lat},${lng}&z=15`;

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.OSM() })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([lng, lat]),
                zoom: 13
            }),
            controls: ol.control.defaults.defaults({ attribution: false, zoom: false, rotate: false })
        });

        // Venue marker
        const marker = new ol.Feature({
            geometry: new ol.geom.Point(ol.proj.fromLonLat([lng, lat]))
        });

        marker.setStyle(new ol.style.Style({
            image: new ol.style.Circle({
                radius: 10,
                fill: new ol.style.Fill({ color: '#3F8C66' }),
                stroke: new ol.style.Stroke({ color: 'white', width: 3 })
            })
        }));

        map.addLayer(new ol.layer.Vector({
            source: new ol.source.Vector({ features: [marker] })
        }));
    </script>
</body>
</html>
